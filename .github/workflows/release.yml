name: release

# Publish the public OCI image to ghcr.io/pleme-io via substrate's reusable
# image-push (nix build .#image -> forge push). GITHUB_TOKEN has packages:write.
# NOTE: make the ghcr package PUBLIC once after the first push (Package settings →
# Change visibility) so consumers pull it anonymously — no image-pull secret.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    uses: pleme-io/substrate/.github/workflows/image-push.yml@main
    with:
      imageAttr: image
      imageName: pleme-io/rabbitmq-definitions-loader
      tag: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0' }}
      extraTags: "latest"
    secrets: inherit
